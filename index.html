<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Listener | Multi-Step Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; } }
    </style>
</head>
<body class="p-6">

    <main class="w-full max-w-md space-y-8 text-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">INSIGHT <span class="text-indigo-500">LISTENER</span></h1>
            <p id="system-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Professional Audio Workflow</p>
        </div>

        <!-- STEP 1: Recording -->
        <div id="step-1" class="glass-card p-10 shadow-2xl transition-all">
            <div id="timer" class="text-6xl font-black mb-8 text-white tracking-tighter">00:00</div>
            <button id="micBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">Tap to Record Adda</p>
        </div>

        <!-- STEP 2: Process Audio (Listen & Convert) -->
        <div id="step-2" class="hidden space-y-4 animate-in slide-in-from-bottom-10">
            <div class="glass-card p-8 border border-indigo-500/30">
                <i data-lucide="music" class="w-10 h-10 text-indigo-500 mx-auto mb-4"></i>
                <p class="text-xs font-black text-white uppercase tracking-widest">Audio File Saved</p>
            </div>
            <button id="processBtn" class="w-full bg-indigo-500 text-white py-5 rounded-2xl font-black text-xs tracking-[0.2em] uppercase shadow-xl hover:bg-indigo-400">
                PROCESS & EXTRACT TEXT
            </button>
            <button onclick="location.reload()" class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Discard</button>
        </div>

        <!-- STEP 3: Preview Transcript & Final Send -->
        <div id="step-3" class="hidden space-y-4 animate-in slide-in-from-bottom-10">
            <div class="glass-card p-6 text-left border border-white/10">
                <p class="text-[9px] font-black text-indigo-400 uppercase mb-3 tracking-widest text-center">Extracted Transcript</p>
                <div id="transcript-box" class="text-sm text-slate-300 font-medium leading-relaxed max-h-40 overflow-y-auto px-2 italic">
                    Analyzing voice...
                </div>
            </div>
            <button id="sendBtn" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xs tracking-[0.2em] uppercase shadow-xl hover:bg-green-500">
                SEND TO AI FOR BUSINESS MODEL
            </button>
        </div>

        <!-- STEP 4: Final Output -->
        <div id="step-4" class="hidden glass-card p-8 text-left border-t-4 border-indigo-500 animate-in zoom-in-95">
            <div id="ai-content" class="text-sm text-slate-300 leading-relaxed space-y-4 font-medium"></div>
            <button onclick="location.reload()" class="mt-8 w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[9px] font-bold uppercase tracking-widest">New Session</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let mediaRecorder, audioChunks = [], timerInterval, startTime;
        let finalTranscript = "";
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds";

        // Logic 1: Recording
        document.getElementById('micBtn').addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    document.getElementById('system-status').innerText = "AUDIO READY";
                };
                mediaRecorder.start();
                startTime = Date.now();
                document.getElementById('micBtn').classList.add('bg-red-500', 'recording-pulse');
                document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                lucide.createIcons();
                timerInterval = setInterval(() => {
                    let sec = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                }, 1000);
                document.getElementById('system-status').innerText = "RECORDING...";
            } else {
                mediaRecorder.stop();
                clearInterval(timerInterval);
            }
        });

        // Logic 2: Process Audio to Text
        document.getElementById('processBtn').addEventListener('click', async () => {
            const btn = document.getElementById('processBtn');
            btn.innerHTML = 'AI IS LISTENING<span class="loading-dots"></span>';
            btn.disabled = true;

            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "Convert this audio into Bengali text exactly as spoken. No analysis, just transcription." },
                                { inline_data: { mime_type: "audio/wav", data: base64Audio } }
                            ]}]
                        })
                    });
                    const data = await response.json();
                    finalTranscript = data.candidates[0].content.parts[0].text;
                    
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                    document.getElementById('transcript-box').innerText = `"${finalTranscript}"`;
                    document.getElementById('system-status').innerText = "TRANSCRIPTION COMPLETE";
                } catch (err) { alert("Error transcribing!"); location.reload(); }
            };
        });

        // Logic 3: Final Send to AI
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const btn = document.getElementById('sendBtn');
            btn.innerHTML = 'GENERATING STRATEGY<span class="loading-dots"></span>';
            btn.disabled = true;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const prompt = `Based on this conversation: "${finalTranscript}", identify the main 'Pain Point' and create a Business Startup Model with Value Proposition and Revenue Plan in English. Use bold headers.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                let output = data.candidates[0].content.parts[0].text;
                output = output.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerHTML = output;
                document.getElementById('system-status').innerText = "SUCCESS";
            } catch (err) { alert("Final API Error!"); location.reload(); }
        });
    </script>
</body>
</html>
