<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalPulse AI | Heavy Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #display-box { min-height: 200px; background: #000; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #334155; }
        .recording-active { background: #ef4444 !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col items-center p-5">

    <header class="w-full max-w-md text-center my-8">
        <h1 class="text-3xl font-black italic tracking-tighter text-white">VOCALPULSE <span class="text-indigo-500 text-xl">v3.1</span></h1>
        <p id="debug-info" class="text-[10px] text-yellow-500 font-bold mt-2 uppercase">System: Initializing...</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div id="display-box" class="relative group">
            <div id="guide-text" class="absolute inset-0 flex items-center justify-center text-slate-600 font-bold text-center p-6">
                মামা, বাটন টিপে কথা বলা শুরু কর, এখানে লেখা উঠবে!
            </div>
            <div class="relative z-10 text-xl font-bold leading-relaxed">
                <span id="final-span" class="text-white"></span>
                <span id="interim-span" class="text-indigo-400 opacity-70"></span>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div id="timer" class="text-5xl font-black mb-8 text-white tabular-nums">00:00</div>
            
            <button id="mainBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 transition-all duration-300">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>

            <div id="engine-status" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Engine: Ready to Start</div>

            <div id="resultArea" class="hidden mt-8 space-y-4">
                <audio id="audioPlayback" controls class="w-full h-10"></audio>
                <div class="flex gap-3">
                    <button id="copyText" class="flex-1 bg-indigo-500 text-white py-3 rounded-xl text-[10px] font-black uppercase">Copy Text</button>
                    <button onclick="location.reload()" class="flex-1 bg-white/10 text-white py-3 rounded-xl text-[10px] font-black uppercase">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, mediaRecorder, chunks = [], isRecording = false, timer;

        // --- THE RELIABLE ENGINE SETUP ---
        const initEngine = () => {
            const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechSDK) {
                document.getElementById('debug-info').innerText = "ERROR: Browser Not Supported!";
                return null;
            }

            const rec = new SpeechSDK();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'bn-BD'; // বাংলা ভাষা

            rec.onstart = () => document.getElementById('debug-info').innerText = "Status: Listening Now...";
            
            rec.onresult = (event) => {
                document.getElementById('guide-text').style.display = 'none';
                let interim = '', final = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) final += transcript + ' ';
                    else interim += transcript;
                }
                
                document.getElementById('final-span').textContent += final;
                document.getElementById('interim-span').textContent = interim;
            };

            rec.onerror = (e) => {
                document.getElementById('debug-info').innerText = "ENGINE ERROR: " + e.error;
                if(isRecording) { try { rec.stop(); rec.start(); } catch(x) {} }
            };

            return rec;
        };

        recognition = initEngine();

        async function startWork() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    chunks = [];
                    
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        document.getElementById('audioPlayback').src = URL.createObjectURL(blob);
                        document.getElementById('resultArea').classList.remove('hidden');
                        stream.getTracks().forEach(t => t.stop());
                    };

                    mediaRecorder.start();
                    if(recognition) recognition.start();
                    
                    isRecording = true;
                    document.getElementById('mainBtn').classList.add('recording-active');
                    document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                    document.getElementById('engine-status').innerText = "LIVE RECORDING...";
                    lucide.createIcons();

                    let startTime = Date.now();
                    timer = setInterval(() => {
                        let sec = Math.floor((Date.now() - startTime) / 1000);
                        document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                    }, 1000);

                } catch (err) { alert("Mic Permission চাই মামা!"); }
            } else {
                isRecording = false;
                mediaRecorder.stop();
                if(recognition) recognition.stop();
                clearInterval(timer);
                document.getElementById('mainBtn').classList.remove('recording-active');
                document.getElementById('micIcon').setAttribute('data-lucide', 'mic');
                document.getElementById('engine-status').innerText = "SAVED";
                lucide.createIcons();
            }
        }

        document.getElementById('mainBtn').addEventListener('click', startWork);
        document.getElementById('copyText').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('final-span').textContent);
            alert("লেখা কপি হয়েছে মামা!");
        });
    </script>
</body>
</html>
