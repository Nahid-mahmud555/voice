<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insight Listener | AI BuildFest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-blue-400 mb-2 text-center">The Insight Listener</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Convert casual talk into startup ideas and behavioral reports.</p>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Enter Conversation:</label>
                <textarea id="userInput" rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Type your experience here..."></textarea>
            </div>

            <button onclick="getAIResponse()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition flex items-center justify-center">
                <span id="btnText">Analyze Now</span>
            </button>
        </div>

        <div id="resultBox" class="mt-8 hidden space-y-4 border-t border-gray-700 pt-6">
            <h3 class="text-xl font-bold text-green-400">AI Report:</h3>
            <div id="aiOutput" class="text-gray-300 leading-relaxed whitespace-pre-wrap bg-gray-900 p-6 rounded-xl border border-gray-700 shadow-inner text-sm">
                <!-- AI Response will appear here -->
            </div>
        </div>
    </div>

    <script>
        async function getAIResponse() {
            const userInput = document.getElementById('userInput').value;
            const btnText = document.getElementById('btnText');
            const resultBox = document.getElementById('resultBox');
            const aiOutput = document.getElementById('aiOutput');

            // 🔑 REPLACE THE TEXT BELOW WITH YOUR HF TOKEN (ONLY ENGLISH)
            const token = "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"; 

            if (!userInput || token.includes("xxxx")) {
                alert("Please provide input and a valid API Token in the code.");
                return;
            }

            btnText.innerText = "Analyzing...";
            resultBox.classList.add('hidden');

            const promptText = "Analyze this conversation for business ideas and behavioral frustration: " + userInput;

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct",
                    {
                        headers: { 
                            "Authorization": "Bearer " + token.trim(),
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: promptText,
                            parameters: { 
                                max_new_tokens: 500, 
                                return_full_text: false,
                                temperature: 0.7
                            }
                        }),
                    }
                );

                const result = await response.json();
                
                resultBox.classList.remove('hidden');

                if (result.error) {
                    aiOutput.innerText = "Error: " + JSON.stringify(result.error);
                } else if (Array.isArray(result) && result[0].generated_text) {
                    aiOutput.innerText = result[0].generated_text;
                } else {
                    aiOutput.innerText = "Check your connection or API status.";
                }

            } catch (err) {
                aiOutput.innerText = "System Error: " + err.message;
                resultBox.classList.remove('hidden');
            } finally {
                btnText.innerText = "Analyze Now";
            }
        }
    </script>
</body>
</html>
