<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Listener | Zero Glitch Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .wave-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; margin-top: 20px; visibility: hidden; }
        .bar { width: 4px; height: 10px; background: #6366f1; border-radius: 10px; animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 40px; } }
        #text-editor { background: #000; border: 1px solid #1e293b; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6">

    <main class="w-full max-w-md space-y-8 text-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">INSIGHT <span class="text-indigo-500">LISTENER</span></h1>
            <p id="system-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Ready for Adda</p>
        </div>

        <div id="step-1" class="glass-card p-10 shadow-2xl transition-all">
            <div id="timer" class="text-6xl font-black mb-8 text-white tabular-nums tracking-tighter">00:00</div>
            <button id="micBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/50 hover:scale-105 transition-all">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>
            <div id="wave" class="wave-container"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <p id="step-instruction" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">Tap to start talking</p>
        </div>

        <div id="step-3" class="hidden space-y-4 animate-in slide-in-from-bottom-10">
            <div id="text-editor" class="p-6 text-left shadow-2xl border border-indigo-500/20">
                <p class="text-[9px] font-black text-indigo-400 uppercase mb-3 tracking-widest">Transcript Preview</p>
                <textarea id="final-text" class="w-full bg-transparent border-none outline-none text-white font-bold leading-relaxed resize-none text-lg" rows="5"></textarea>
            </div>
            <button id="sendToAiBtn" class="w-full bg-indigo-500 text-white py-5 rounded-2xl font-black text-xs tracking-[0.2em] uppercase shadow-xl hover:bg-indigo-400">Generate Model</button>
            <button onclick="location.reload()" class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Restart</button>
        </div>

        <div id="step-4" class="hidden glass-card p-8 text-left border-t-4 border-indigo-500">
            <div id="ai-content" class="text-sm text-slate-300 leading-relaxed space-y-4"></div>
            <button onclick="location.reload()" class="mt-8 w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[9px] font-bold uppercase tracking-widest">New Session</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, isRecording = false, timer;
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds"; 

        const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechSDK) {
            recognition = new SpeechSDK();
            recognition.continuous = true;
            recognition.interimResults = false; // মামা, এটাকে FALSE করে দিলাম যাতে রিপিট না হয়
            recognition.lang = 'bn-BD';

            recognition.onresult = (e) => {
                let currentText = "";
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    currentText += e.results[i][0].transcript;
                }
                // সরাসরি টেক্সট এরিয়াতে আপডেট হবে কোনো ডুপ্লিকেট ছাড়াই
                document.getElementById('final-text').value = currentText;
                document.getElementById('system-status').innerText = "LISTENING...";
            };
        }

        document.getElementById('micBtn').addEventListener('click', () => {
            if (!isRecording) {
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').classList.replace('bg-indigo-600', 'bg-red-500');
                document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                document.getElementById('wave').style.visibility = 'visible';
                lucide.createIcons();
                let start = Date.now();
                timer = setInterval(() => {
                    let sec = Math.floor((Date.now() - start) / 1000);
                    document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                }, 1000);
            } else {
                isRecording = false;
                recognition.stop();
                clearInterval(timer);
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
            }
        });

        document.getElementById('sendToAiBtn').addEventListener('click', async () => {
            const userText = document.getElementById('final-text').value;
            const btn = document.getElementById('sendToAiBtn');
            btn.innerText = "THINKING..."; btn.disabled = true;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Startup Consultant Mode: "${userText}". Provide Value Proposition, Revenue Model, and MVP in English with bold headers.` }] }] })
                });
                const data = await response.json();
                let output = data.candidates[0].content.parts[0].text;
                output = output.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerHTML = output;
            } catch (err) { alert("API Error!"); location.reload(); }
        });
    </script>
</body>
</html>
