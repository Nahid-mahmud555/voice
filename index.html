<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Listener | Manual Control Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .recording-pulse { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
        #text-editor { background: #000; border: 1px solid #1e293b; border-radius: 1.5rem; scrollbar-width: none; }
    </style>
</head>
<body class="p-6">

    <main class="w-full max-w-md space-y-8 text-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white">INSIGHT <span class="text-indigo-500">LISTENER</span></h1>
            <p id="system-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Manual Analysis Mode</p>
        </div>

        <div id="step-1" class="glass-card p-10 shadow-2xl relative">
            <div id="timer" class="text-6xl font-black mb-8 text-white tabular-nums tracking-tighter">00:00</div>
            <button id="micBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 transition-all duration-300">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Step 1: Record Idea</p>
        </div>

        <div id="step-2" class="hidden glass-card p-6 animate-in zoom-in-95">
            <button id="analyzeBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs tracking-widest mb-4 flex items-center justify-center gap-2">
                <i data-lucide="search" class="w-4 h-4"></i> ANALYZE VOICE
            </button>
            <button onclick="location.reload()" class="text-red-500 text-[10px] font-bold uppercase tracking-widest">Delete & Retry</button>
        </div>

        <div id="step-3" class="hidden space-y-4 animate-in slide-in-from-bottom-5">
            <div id="text-editor" class="p-5 text-left">
                <p class="text-[9px] font-black text-indigo-500 uppercase mb-2">Voice Transcript</p>
                <textarea id="final-text" class="w-full bg-transparent border-none outline-none text-white font-bold leading-relaxed resize-none" rows="4"></textarea>
            </div>
            <button id="sendToAiBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs tracking-widest hover:bg-green-500 hover:text-white transition-all">
                SEND TO AI ENGINE
            </button>
        </div>

        <div id="step-4" class="hidden glass-card p-6 text-left border-l-4 border-indigo-500 animate-in fade-in">
            <h3 class="text-indigo-400 font-black text-[10px] uppercase mb-3 flex items-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4"></i> Final Startup Roadmap
            </h3>
            <div id="ai-content" class="text-sm text-slate-300 leading-relaxed space-y-4 font-medium whitespace-pre-line">
                </div>
            <button onclick="location.reload()" class="mt-6 w-full py-3 bg-white/5 rounded-xl text-[9px] font-bold uppercase tracking-widest">Start New Insight</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, isRecording = false, timer, voiceData = "";
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds"; // মামা এখানে তোর Key টা বসাবি

        // --- Speech Setup ---
        const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechSDK) {
            recognition = new SpeechSDK();
            recognition.continuous = true;
            recognition.lang = 'bn-BD';
            recognition.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) voiceData += e.results[i][0].transcript + " ";
                }
            };
        }

        // --- Recording Logic ---
        document.getElementById('micBtn').addEventListener('click', () => {
            if(!isRecording) {
                voiceData = "";
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording-pulse');
                document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                document.getElementById('system-status').innerText = "Recording...";
                lucide.createIcons();
                
                let start = Date.now();
                timer = setInterval(() => {
                    let sec = Math.floor((Date.now() - start) / 1000);
                    document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                }, 1000);
            } else {
                recognition.stop();
                isRecording = false;
                clearInterval(timer);
                document.getElementById('step-1').classList.add('opacity-50');
                document.getElementById('micBtn').disabled = true;
                document.getElementById('step-2').classList.remove('hidden');
                document.getElementById('system-status').innerText = "Voice Captured";
            }
        });

        // --- Analyze Voice ---
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('final-text').value = voiceData || "মামা, কিছু শোনা যায়নি! আবার রেকর্ড করো।";
            document.getElementById('system-status').innerText = "Analysis Complete";
        });

        // --- Send to Gemini AI ---
        document.getElementById('sendToAiBtn').addEventListener('click', async () => {
            const finalIdea = document.getElementById('final-text').value;
            document.getElementById('sendToAiBtn').innerText = "AI GENERATING...";
            document.getElementById('sendToAiBtn').disabled = true;

            const prompt = `User's idea: "${finalIdea}". 
            Task: Provide a professional Startup Model with: 1. Value Proposition, 2. Revenue Model, 3. Execution Plan. 
            Language: English. Style: Professional and concise for a competition judge.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerText = result;
                document.getElementById('system-status').innerText = "Final Insight Ready";
            } catch (err) {
                alert("API Key বা ইন্টারনেটে সমস্যা মামা!");
                document.getElementById('sendToAiBtn').innerText = "RETRY SEND";
                document.getElementById('sendToAiBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
