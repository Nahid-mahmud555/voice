<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Listener | Final Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .recording-pulse { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
        #text-editor { background: #000; border: 1px solid #1e293b; border-radius: 1.5rem; }
        #ai-content strong { color: #818cf8; font-weight: 800; }
    </style>
</head>
<body class="p-6">

    <main class="w-full max-w-md space-y-8 text-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white">INSIGHT <span class="text-indigo-500">LISTENER</span></h1>
            <p id="system-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Ready for Varendra University Demo</p>
        </div>

        <div id="step-1" class="glass-card p-10 shadow-2xl transition-all">
            <div id="timer" class="text-6xl font-black mb-8 text-white tabular-nums tracking-tighter">00:00</div>
            <button id="micBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 transition-all duration-300">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>
            <p id="step-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Step 1: Record Your Idea</p>
        </div>

        <div id="step-3" class="hidden space-y-4 animate-in slide-in-from-bottom-5">
            <div id="text-editor" class="p-5 text-left shadow-2xl">
                <p class="text-[9px] font-black text-indigo-500 uppercase mb-2">Captured Insight</p>
                <textarea id="final-text" class="w-full bg-transparent border-none outline-none text-white font-bold leading-relaxed resize-none text-lg" rows="4"></textarea>
            </div>
            <button id="sendToAiBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs tracking-widest hover:bg-green-500 hover:text-white transition-all shadow-lg">
                GENERATE BUSINESS MODEL
            </button>
            <button onclick="location.reload()" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Cancel & Reset</button>
        </div>

        <div id="step-4" class="hidden glass-card p-6 text-left border-l-4 border-indigo-500 animate-in zoom-in-95">
            <h3 class="text-indigo-400 font-black text-[10px] uppercase mb-3 flex items-center gap-2">
                <i data-lucide="zap" class="w-4 h-4"></i> AI-Powered Roadmap
            </h3>
            <div id="ai-content" class="text-sm text-slate-300 leading-relaxed space-y-4 font-medium whitespace-pre-line">
                </div>
            <button onclick="location.reload()" class="mt-8 w-full py-3 bg-white/5 rounded-xl text-[9px] font-bold uppercase tracking-widest hover:bg-white/10">Start New Project</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, isRecording = false, timer, voiceData = "";
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds"; // তোর কি টা এখানে সেফ আছে

        // Speech Recognition Setup
        const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechSDK) {
            recognition = new SpeechSDK();
            recognition.continuous = true;
            recognition.interimResults = false; // শুধুমাত্র ফাইনাল রেজাল্ট নিবো নির্ভুলতার জন্য
            recognition.lang = 'bn-BD';
            
            recognition.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) {
                        voiceData += e.results[i][0].transcript + " ";
                    }
                }
            };

            recognition.onerror = (err) => {
                console.error("Speech Error:", err.error);
                if(err.error === 'not-allowed') alert("মামা, ব্রাউজার থেকে মাইক্রোফোন পারমিশন এলাও করো!");
            };
        } else {
            alert("মামা, তোর ব্রাউজার ভয়েস সাপোর্ট করে না। ক্রোম ইউজ কর!");
        }

        // Recording Action
        document.getElementById('micBtn').addEventListener('click', () => {
            if (!isRecording) {
                voiceData = "";
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording-pulse');
                document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                document.getElementById('system-status').innerText = "LISTENING TO YOUR VOICE...";
                lucide.createIcons();
                
                let start = Date.now();
                timer = setInterval(() => {
                    let sec = Math.floor((Date.now() - start) / 1000);
                    document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                }, 1000);
            } else {
                recognition.stop();
                isRecording = false;
                clearInterval(timer);
                document.getElementById('micBtn').classList.remove('recording-pulse');
                document.getElementById('system-status').innerText = "ANALYZING VOICE...";
                
                // ১ সেকেন্ড ওয়েট করবো যাতে ব্রাউজার পুরো টেক্সট প্রসেস করতে পারে
                setTimeout(() => {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                    document.getElementById('final-text').value = voiceData.trim() || "মামা, কিছু শোনা যায়নি! আবার ট্রাই করো।";
                }, 1000);
            }
        });

        // AI Generation Action
        document.getElementById('sendToAiBtn').addEventListener('click', async () => {
            const userText = document.getElementById('final-text').value;
            if(userText.length < 5) { alert("আইডিয়াটা একটু বড় করে বলো মামা!"); return; }

            const btn = document.getElementById('sendToAiBtn');
            btn.innerText = "AI IS BUILDING ROADMAP...";
            btn.disabled = true;

            const prompt = `Act as a VC. Convert this idea: "${userText}" into a professional business model. 
            Include: 1. Value Proposition, 2. Revenue Streams, 3. MVP Roadmap. 
            Language: English. Formatting: Use bold for headers.`;

            try {
                // v1beta এর বদলে v1 ইউজ করছি স্টেবল কানেকশনের জন্য
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if(!response.ok) throw new Error("API Limit or Network Issue");

                const data = await response.json();
                let aiText = data.candidates[0].content.parts[0].text;

                // Formatting Markdown to HTML
                aiText = aiText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                aiText = aiText.replace(/\n/g, '<br>');

                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerHTML = aiText;
                document.getElementById('system-status').innerText = "SUCCESS: MODEL READY";

            } catch (err) {
                console.error(err);
                alert("নেটওয়ার্ক এরর! মামা, ব্যাকআপ মোড দেখাচ্ছি।");
                
                // এরর হলেও ডেমো বাঁচানোর জন্য ব্যাকআপ ডাটা
                setTimeout(() => {
                    document.getElementById('step-3').classList.add('hidden');
                    document.getElementById('step-4').classList.remove('hidden');
                    document.getElementById('ai-content').innerHTML = "<strong>1. Value Prop:</strong> Local Tech Solution.<br><strong>2. Revenue:</strong> Transaction Fee.<br><strong>3. MVP:</strong> Mobile App Launch.";
                }, 1000);
            }
        });
    </script>
</body>
</html>
