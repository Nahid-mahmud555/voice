<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insight Listener | AI BuildFest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-blue-400 mb-2 text-center">The Insight Listener</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Turn casual Adda into Startup Ideas & Self-Improvement Reports.</p>

        <!-- Input Section -->
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Your Conversation (Banglish/English):</label>
                <textarea id="userInput" rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="মামা, রিকশা পাচ্ছিলাম না, অনেক গালি দিছি..."></textarea>
            </div>

            <button onclick="getAIResponse()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition flex items-center justify-center shadow-lg shadow-blue-900/20">
                <span id="btnText">Analyze Conversation</span>
            </button>
        </div>

        <!-- Result Section -->
        <div id="resultBox" class="mt-8 hidden space-y-4 border-t border-gray-700 pt-6">
            <h3 class="text-xl font-bold text-green-400">AI Insight Report:</h3>
            <div id="aiOutput" class="text-gray-300 leading-relaxed whitespace-pre-wrap bg-gray-900 p-6 rounded-xl border border-gray-700 shadow-inner">
                <!-- Data will appear here -->
            </div>
        </div>
    </div>

    <script>
        async function getAIResponse() {
            const userInput = document.getElementById('userInput').value;
            const btnText = document.getElementById('btnText');
            const resultBox = document.getElementById('resultBox');
            const aiOutput = document.getElementById('aiOutput');

            // 🔑 এখানে তোর Hugging Face Token টা বসিয়ে দে
            const token = "এখানে_তোর_টোকেন_বসা"; 

            if (!userInput) {
                alert("Mamma, conversation input to de!");
                return;
            }

            if (token === "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") {
                alert("Mamma, token ta to boshas nai code-er bhitore!");
                return;
            }

            // UI Loading state
            btnText.innerText = "Analyzing Your Adda...";
            resultBox.classList.add('hidden');

            // System Prompt with constraints
            const finalPrompt = `Analyze the following informal conversation (Banglish/English). 
            Extract and present:
            1. Business Opportunities: Any problems mentioned that could be a startup idea.
            2. Behavioral Report: Analyze frustration levels and mention any slang/offensive language usage.
            
            Conversation: "${userInput}"
            
            Format the response in a structured and easy-to-read way.`;

            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct",
                    {
                        headers: { 
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ 
                            inputs: finalPrompt,
                            parameters: { 
                                max_new_tokens: 800, 
                                return_full_text: false,
                                temperature: 0.7
                            }
                        }),
                    }
                );

                const result = await response.json();
                
                if (result.error) {
                    aiOutput.innerText = "API Error: " + (result.error.message || result.error);
                } else if (Array.isArray(result) && result[0].generated_text) {
                    aiOutput.innerText = result[0].generated_text;
                } else {
                    aiOutput.innerText = "Something went wrong. Check your Token or Internet.";
                }
                
                resultBox.classList.remove('hidden');

            } catch (err) {
                aiOutput.innerText = "System Error: " + err.message;
                resultBox.classList.remove('hidden');
            } finally {
                btnText.innerText = "Analyze Conversation";
            }
        }
    </script>
</body>
</html>
