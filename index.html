<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Insight Listener | AI Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #display-box { min-height: 180px; background: #000; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #1e293b; position: relative; }
        
        /* Voice Visualizer Animation */
        .visualizer-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; margin-top: 15px; display: none; }
        .bar { width: 4px; height: 10px; background: #6366f1; border-radius: 10px; animation: bounce 1s ease-in-out infinite; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 35px; } }

        .recording-active { background: #ef4444 !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .ai-badge { background: linear-gradient(90deg, #6366f1, #a855f7); padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="flex flex-col items-center p-5">

    <header class="w-full max-w-md text-center my-8">
        <h1 class="text-3xl font-black italic tracking-tighter text-white">INSIGHT <span class="text-indigo-500 italic">LISTENER</span></h1>
        <div class="flex justify-center gap-2 mt-2">
            <span class="ai-badge uppercase">AI-Native</span>
            <span id="debug-info" class="text-[9px] text-indigo-400 font-bold uppercase py-1 px-2 bg-indigo-500/10 rounded-lg">System: Initializing...</span>
        </div>
    </header>

    <main class="w-full max-w-md space-y-6">
        <!-- Live Text Box -->
        <div id="display-box">
            <div id="guide-text" class="absolute inset-0 flex items-center justify-center text-slate-700 font-bold text-center p-6 text-sm">
                মামা, বাটন টিপে তোমার বিজনেস আইডিয়াটা বলো...
            </div>
            <div class="relative z-10 text-lg font-bold leading-relaxed">
                <span id="final-span" class="text-white"></span>
                <span id="interim-span" class="text-indigo-400 opacity-60"></span>
            </div>
            <!-- Visualizer Animation -->
            <div id="visualizer" class="visualizer-container">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 text-center shadow-2xl relative overflow-hidden">
            <div id="timer" class="text-5xl font-black mb-8 text-white tabular-nums tracking-tighter">00:00</div>
            
            <button id="mainBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 transition-all duration-300 relative z-20">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>

            <div id="engine-status" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Ready to analyze</div>

            <!-- AI Output Area -->
            <div id="aiResponse" class="hidden mt-8 text-left border-t border-white/10 pt-6 animate-in fade-in slide-in-from-bottom-4">
                <h3 class="text-indigo-400 font-black text-xs uppercase mb-3 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> AI Startup Roadmap
                </h3>
                <div id="aiContent" class="text-sm text-slate-300 leading-relaxed space-y-3">
                    <!-- AI generated content will appear here -->
                </div>
            </div>

            <!-- Audio Recording Player (Hidden by default) -->
            <div id="resultArea" class="hidden mt-6 space-y-4">
                <audio id="audioPlayback" controls class="w-full h-8 opacity-50"></audio>
                <button onclick="location.reload()" class="w-full bg-white/5 hover:bg-white/10 text-white py-3 rounded-xl text-[10px] font-black uppercase transition-all">Start New Insight</button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, mediaRecorder, chunks = [], isRecording = false, timer;
        
        // মামা এখানে তোর Gemini API Key টা বসাবি
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds"; 

        const initEngine = () => {
            const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechSDK) {
                document.getElementById('debug-info').innerText = "ERROR: Browser Not Supported!";
                return null;
            }
            const rec = new SpeechSDK();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'bn-BD'; 

            rec.onstart = () => {
                document.getElementById('debug-info').innerText = "Status: Listening...";
                document.getElementById('visualizer').style.display = 'flex';
            };
            
            rec.onresult = (event) => {
                document.getElementById('guide-text').style.display = 'none';
                let interim = '', final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) final += transcript + ' ';
                    else interim += transcript;
                }
                document.getElementById('final-span').textContent += final;
                document.getElementById('interim-span').textContent = interim;
            };

            rec.onerror = (e) => {
                document.getElementById('debug-info').innerText = "ERROR: " + e.error;
            };

            return rec;
        };

        recognition = initEngine();

        // Gemini AI Function
        async function getBusinessModel(text) {
            document.getElementById('aiResponse').classList.remove('hidden');
            document.getElementById('aiContent').innerHTML = "<p class='animate-pulse text-indigo-300'>মামা দাড়াও, AI আইডিয়াটা এনালাইসিস করছে...</p>";
            
            const prompt = `You are a professional startup consultant. The user said this in Banglish/Bengali: "${text}". 
            Extract the business idea and provide a concise Startup Roadmap in English with 3 parts: 
            1. Core Value (What is it?), 
            2. Monetization (How to make money?), 
            3. Next Step (What to do first?). 
            Keep it very professional for a project judge.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                document.getElementById('aiContent').innerText = aiResponseText;
            } catch (err) {
                document.getElementById('aiContent').innerText = "মামা, API Key ঠিকঠাক কাজ করছে না অথবা ইন্টারনেট নাই!";
            }
        }

        async function startWork() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    chunks = [];
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        document.getElementById('audioPlayback').src = URL.createObjectURL(blob);
                        document.getElementById('resultArea').classList.remove('hidden');
                        stream.getTracks().forEach(t => t.stop());
                    };

                    mediaRecorder.start();
                    if(recognition) recognition.start();
                    
                    isRecording = true;
                    document.getElementById('mainBtn').classList.add('recording-active');
                    document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                    document.getElementById('engine-status').innerText = "LISTENING LIVE...";
                    lucide.createIcons();

                    let startTime = Date.now();
                    timer = setInterval(() => {
                        let sec = Math.floor((Date.now() - startTime) / 1000);
                        document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                    }, 1000);

                } catch (err) { alert("Mic Access allow koro mama!"); }
            } else {
                isRecording = false;
                mediaRecorder.stop();
                if(recognition) recognition.stop();
                clearInterval(timer);
                document.getElementById('visualizer').style.display = 'none';
                document.getElementById('mainBtn').classList.remove('recording-active');
                document.getElementById('micIcon').setAttribute('data-lucide', 'mic');
                document.getElementById('engine-status').innerText = "Insight Captured";
                lucide.createIcons();
                
                // AI কল করা হচ্ছে
                const userText = document.getElementById('final-span').textContent;
                if(userText.length > 5) getBusinessModel(userText);
            }
        }

        document.getElementById('mainBtn').addEventListener('click', startWork);
    </script>
</body>
</html>
