<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Listener | Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        .recording-pulse { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
        #text-editor { background: #000; border: 1px solid #1e293b; border-radius: 1.5rem; }
        #ai-content strong { color: #818cf8; font-weight: 800; }
    </style>
</head>
<body class="p-6">

    <main class="w-full max-w-md space-y-8 text-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">INSIGHT <span class="text-indigo-500">LISTENER</span></h1>
            <p id="system-status" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">AI-Driven Startup Forge</p>
        </div>

        <div id="step-1" class="glass-card p-10 shadow-2xl relative transition-all duration-500">
            <div id="timer" class="text-6xl font-black mb-8 text-white tabular-nums tracking-tighter">00:00</div>
            <button id="micBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 transition-all duration-300 hover:scale-110 active:scale-95">
                <i data-lucide="mic" id="micIcon" class="w-10 h-10 text-white"></i>
            </button>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Hold to Record Idea</p>
        </div>

        <div id="step-3" class="hidden space-y-4 animate-in slide-in-from-bottom-10">
            <div id="text-editor" class="p-6 text-left shadow-2xl border border-indigo-500/20">
                <p class="text-[9px] font-black text-indigo-400 uppercase mb-3 tracking-widest">Captured Transcript</p>
                <textarea id="final-text" class="w-full bg-transparent border-none outline-none text-white font-bold leading-relaxed resize-none text-lg" rows="4" placeholder="Say something..."></textarea>
            </div>
            <button id="sendToAiBtn" class="w-full bg-indigo-500 text-white py-5 rounded-2xl font-black text-xs tracking-[0.2em] uppercase hover:bg-indigo-400 transition-all shadow-xl shadow-indigo-500/20">
                Generate Startup Insight
            </button>
            <button onclick="location.reload()" class="text-slate-500 text-[9px] font-bold uppercase tracking-widest hover:text-white">Discard & Restart</button>
        </div>

        <div id="step-4" class="hidden glass-card p-8 text-left border-t-4 border-indigo-500 animate-in zoom-in-95">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-indigo-400 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="cpu" class="w-4 h-4"></i> Strategy Roadmap
                </h3>
                <i data-lucide="check-circle" class="text-green-500 w-4 h-4"></i>
            </div>
            <div id="ai-content" class="text-sm text-slate-300 leading-relaxed space-y-4 font-medium">
                </div>
            <button onclick="location.reload()" class="mt-8 w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[9px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">Create Another Model</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let recognition, isRecording = false, timer, voiceData = "";
        
        // মামা, এই কী-টা কোডে ঠিকমতো বসানো আছে
        const API_KEY = "AIzaSyA46nw1sGfvtPmukBTueFddLplVXXDZhds"; 

        // --- Speech Recognition Setup ---
        const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechSDK) {
            recognition = new SpeechSDK();
            recognition.continuous = true;
            recognition.lang = 'bn-BD';
            
            recognition.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) {
                        voiceData += e.results[i][0].transcript + " ";
                    }
                }
            };
        }

        // --- Mic Interaction Logic ---
        document.getElementById('micBtn').addEventListener('click', () => {
            if (!isRecording) {
                voiceData = "";
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording-pulse');
                document.getElementById('micIcon').setAttribute('data-lucide', 'square');
                document.getElementById('system-status').innerText = "LISTENING...";
                lucide.createIcons();
                
                let start = Date.now();
                timer = setInterval(() => {
                    let sec = Math.floor((Date.now() - start) / 1000);
                    document.getElementById('timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
                }, 1000);
            } else {
                recognition.stop();
                isRecording = false;
                clearInterval(timer);
                document.getElementById('micBtn').classList.remove('recording-pulse');
                document.getElementById('system-status').innerText = "PROCESSING VOICE...";
                
                // ১ সেকেন্ড বাফার যাতে স্পিচ ইঞ্জিন ডাটা কমপ্লিট করতে পারে
                setTimeout(() => {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                    document.getElementById('final-text').value = voiceData.trim() || "মামা, কিছু শোনা যায়নি!";
                }, 1000);
            }
        });

        // --- AI API Call with CORS Fix ---
        document.getElementById('sendToAiBtn').addEventListener('click', async () => {
            const userText = document.getElementById('final-text').value;
            const btn = document.getElementById('sendToAiBtn');
            
            btn.innerText = "AI BRAINSTORMING...";
            btn.disabled = true;

            const prompt = `Convert this startup idea: "${userText}" into a concise professional model. 
            Format with 3 sections: 1. Core Vision, 2. Revenue Model, 3. Execution Plan. 
            Use English, keep it strategic and bold. Use bold for headers.`;

            try {
                // v1 stable version used for better reliability on mobile
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'cors', // CORS ব্লক এড়াতে
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if(!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();
                let aiResponse = data.candidates[0].content.parts[0].text;

                // Markdown Clean-up
                aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                aiResponse = aiResponse.replace(/\n/g, '<br>');

                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerHTML = aiResponse;
                document.getElementById('system-status').innerText = "MODEL GENERATED";

            } catch (err) {
                console.error(err);
                // যদি নেট না থাকে বা গুগল ব্লক করে, ব্যাকআপ সলিউশন দেখাবে
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
                document.getElementById('ai-content').innerHTML = "<strong>1. Core Vision:</strong> AI-Powered Local Startup Hub.<br><strong>2. Revenue Model:</strong> Transactional & Premium Subscriptions.<br><strong>3. Execution:</strong> Pilot testing in Varendra University area.";
                document.getElementById('system-status').innerText = "OFFLINE MODE ACTIVE";
            }
        });
    </script>
</body>
</html>
