<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalPulse | Ultra Sensitivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Hind+Siliguri:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glass-card { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(40px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; }
        #display-box { min-height: 250px; background: #000; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #1e293b; overflow-y: auto; text-align: left; }
        #transcript-final { font-size: 1.5rem; color: #ffffff; line-height: 1.4; }
        #transcript-interim { font-size: 1.5rem; color: #4f46e5; font-style: italic; }
        .recording-pulse { background: #dc2626 !important; animation: ripple 1s infinite; }
        @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } }
    </style>
</head>
<body>

    <header class="w-full max-w-lg flex justify-between items-center my-6">
        <h1 class="text-2xl font-black italic">VOCALPULSE <span class="text-indigo-500">ULTRA</span></h1>
        <div id="engine-info" class="text-[9px] bg-white/5 px-3 py-1 rounded-full border border-white/10 uppercase font-bold text-slate-500 tracking-tighter">Engine: Checking...</div>
    </header>

    <main class="w-full max-w-lg">
        <div id="display-box" class="mb-6 relative">
            <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-slate-700 font-bold p-10 text-center">
                মামা, মাইক্রোফোন অন করে একটু জোরে কথা বলো...
            </div>
            <span id="transcript-final"></span>
            <span id="transcript-interim"></span>
        </div>

        <div class="glass-card p-10 text-center">
            <div id="timer" class="text-6xl font-black mb-10 tabular-nums">00:00</div>
            
            <button id="recordBtn" class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto border-4 border-white/10 mb-8 transition-all duration-300">
                <i data-lucide="mic" id="btnIcon" class="w-10 h-10 text-white"></i>
            </button>

            <p id="status-text" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Idle Mode</p>

            <div id="playerArea" class="hidden animate-in fade-in zoom-in-95">
                <audio id="audioOut" controls class="w-full mb-6"></audio>
                <div class="flex gap-4">
                    <a id="dlBtn" class="flex-1 bg-white text-black py-4 rounded-2xl text-xs font-black flex items-center justify-center">SAVE FILE</a>
                    <button onclick="location.reload()" class="flex-1 bg-red-900/20 text-red-500 py-4 rounded-2xl text-xs font-black">RESET</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let rec, mediaRec, chunks = [], isRec = false, tInt;

        // --- SPEECH ENGINE FIX ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            rec = new Speech();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'bn-BD'; 

            document.getElementById('engine-info').innerText = "Engine: Ready";
            document.getElementById('engine-info').classList.replace('text-slate-500', 'text-green-500');

            rec.onresult = (e) => {
                document.getElementById('empty-state').style.display = 'none';
                let fin = "", int = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) fin += e.results[i][0].transcript + " ";
                    else int += e.results[i][0].transcript;
                }
                document.getElementById('transcript-final').textContent += fin;
                document.getElementById('transcript-interim').textContent = int;
            };

            rec.onerror = (e) => {
                console.log("Rec Error:", e.error);
                if (e.error === 'no-speech') {
                    // যদি কথা না শোনে, ইঞ্জিন রিস্টার্ট করবে
                    if(isRec) { try { rec.stop(); rec.start(); } catch(err) {} }
                }
            };
        }

        async function handleAction() {
            if (!isRec) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRec = new MediaRecorder(stream);
                    chunks = [];
                    mediaRec.ondataavailable = e => chunks.push(e.data);
                    mediaRec.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        document.getElementById('audioOut').src = url;
                        document.getElementById('dlBtn').href = url;
                        document.getElementById('dlBtn').download = `VocalPulse.webm`;
                        document.getElementById('playerArea').classList.remove('hidden');
                        stream.getTracks().forEach(t => t.stop());
                    };

                    mediaRec.start();
                    if(rec) rec.start();
                    isRec = true;

                    // UI Setup
                    document.getElementById('recordBtn').classList.add('recording-pulse');
                    document.getElementById('btnIcon').setAttribute('data-lucide', 'square');
                    document.getElementById('status-text').innerText = "Live Recording & Transcribing";
                    document.getElementById('status-text').classList.replace('text-slate-500', 'text-red-500');
                    lucide.createIcons();

                    let start = Date.now();
                    tInt = setInterval(() => {
                        let diff = Math.floor((Date.now() - start) / 1000);
                        document.getElementById('timer').innerText = `${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
                    }, 1000);
                } catch (e) { alert("Mic allow koro mama!"); }
            } else {
                isRec = false;
                mediaRec.stop();
                if(rec) rec.stop();
                clearInterval(tInt);
                document.getElementById('recordBtn').classList.remove('recording-pulse');
                document.getElementById('btnIcon').setAttribute('data-lucide', 'mic');
                lucide.createIcons();
            }
        }

        document.getElementById('recordBtn').addEventListener('click', handleAction);
    </script>
</body>
</html>
